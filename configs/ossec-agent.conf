<!--
  Wazuh Agent Configuration Template for Windows Endpoints
  
  Install agent: wazuh-agent-4.8.0-1.msi /q
  Copy this file to: C:\Program Files (x86)\ossec-agent\ossec.conf
  Restart service: net stop WazuhSvc && net start WazuhSvc
-->
<ossec_config>
  <!-- Manager connection -->
  <client>
    <server>
      <address>MANAGER_IP_HERE</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>MANAGER_IP_HERE</manager_address>
      <port>1515</port>
      <agent_name>windows-endpoint-01</agent_name>
      <groups>windows</groups>
    </enrollment>
  </client>

  <!-- Sysmon log collection -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Windows Security Event Log -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>
      Event/System[EventID=4624 or EventID=4625 or EventID=4634 or 
      EventID=4648 or EventID=4672 or EventID=4688 or EventID=4698 or 
      EventID=4720 or EventID=4732 or EventID=4776 or EventID=1102]
    </query>
  </localfile>

  <!-- Windows System Event Log -->
  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
    <query>
      Event/System[EventID=7045 or EventID=7040 or EventID=7036]
    </query>
  </localfile>

  <!-- PowerShell logging -->
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Windows PowerShell</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- File Integrity Monitoring -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <directories realtime="yes" check_all="yes">C:\Windows\System32\drivers\etc</directories>
    <directories realtime="yes" check_all="yes">C:\Windows\System32\config</directories>
    <directories check_all="yes">C:\Users\*\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup</directories>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services</windows_registry>
  </syscheck>

  <!-- Vulnerability detection -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <os>yes</os>
    <packages>yes</packages>
    <hotfixes>yes</hotfixes>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>
</ossec_config>
